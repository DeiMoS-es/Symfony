name: Tareas Diarias Symfony

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  symfony-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Instalar Dependencias (Composer)
        # USAMOS 'working-directory' para entrar en club-cine
        working-directory: ./club-cine
        run: composer install --no-dev --optimize-autoloader --no-scripts

      - name: Ejecutar Comando de Symfony
        working-directory: ./club-cine
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_ENV: prod
          APP_SECRET: ${{ secrets.APP_SECRET }}
        # Asegúrate de que el nombre del comando sea el correcto
        run: php bin/console app:daily-tasks

name: Tareas Diarias Symfony

on:
  schedule:
    - cron: '0 0 * * *' # Se ejecuta cada día a medianoche
  workflow_dispatch:     # Botón para ejecutarlo a mano y probar

jobs:
  symfony-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Instalar Dependencias (Composer)
        working-directory: ./club-cine
        run: composer install --no-dev --optimize-autoloader --no-scripts

      - name: Ejecutar Script Directo
        working-directory: ./club-cine
        env:
          APP_ENV: prod
          # Variables reales (Sácalas de Secrets de GitHub)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET || '3f3e4e5d6c7b8a90123456789abcdef0' }}
          
          # Variables "Dummy" (Para engañar a Symfony y que no bloquee el arranque)
          TMDB_API_KEY: "dummy_value_for_kernel"
          TMDB_READ_TOKEN: "dummy_value_for_kernel"
          MAILER_DSN: "null://localhost"
          MESSENGER_TRANSPORT_DSN: "doctrine://default"
          
        # Ruta y nombre confirmados por tu 'ls -l'
        run: php scripts/close-expired.php
